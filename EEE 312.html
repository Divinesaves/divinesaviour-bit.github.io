    load(); startTimer(); displayLeaderboard();
}

// ===== ENGINE =====
let current=0,answers=new Array(questions.length).fill(null);
function load(){
    let q=questions[current];
    let html=`<h3>Q ${current+1}/${questions.length}</h3><p>${q.q}</p>`;
    q.o.forEach((opt,i)=>html+=`<input type="radio" name="ans" value="${i}" ${answers[current]==i?"checked":""}> ${opt}<br>`);
    document.getElementById("quiz").innerHTML=html;
    updateProgress();
}
function save(){let s=document.querySelector('input[name="ans"]:checked');if(s)answers[current]=+s.value;}
function next(){save();if(current<questions.length-1){current++;load();}}
function prev(){save();if(current>0){current--;load();}}
